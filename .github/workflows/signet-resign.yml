# Signet Re-sign - Safe Chained Provenance
#
# This workflow implements the "Semantic Firewall" pattern:
#   1. Developer signs a commit with their user identity.
#   2. PR is reviewed and approved by a human peer.
#   3. On approval, the CI system (Signet Authority) verifies the user's signature
#      and passes all tests, then re-signs (amends) the commit with its own "Seal of Approval".
#   4. The PR now has a "Chained Provenance" (User + CI) and can be merged to main.
#
# Auth: GHA OIDC → auth.notme.bot/cert/gha → bridge cert. No stored SIGNET_MASTER_KEY.

name: Signet Re-sign

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to re-sign (required for manual trigger)'
        required: false
        type: string

# Only one re-sign at a time for the same PR
concurrency:
  group: signet-resign-${{ github.event.pull_request.number || github.event.inputs.pr_number || 'manual' }}
  cancel-in-progress: false

permissions: {}

jobs:
  identity:
    name: Acquire bridge cert
    uses: ./.github/workflows/gha-identity.yml
    with:
      skip_bridge_cert: false
    permissions:
      id-token: write
      contents: read

  resign:
    name: Re-sign approved PR
    runs-on: ubuntu-latest
    needs: identity
    permissions:
      contents: write
      pull-requests: read

    # Only run if:
    # 1. Approval is submitted (or manual trigger)
    # 2. Re-signing is enabled via variable
    # 3. PR is NOT from a fork (GITHUB_TOKEN cannot push to forks)
    if: |
      (github.event.review.state == 'approved' || github.event_name == 'workflow_dispatch') &&
      vars.SIGNET_RESIGN_ENABLED == 'true' &&
      (github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch')

    steps:
      - name: Validate Manual Trigger
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number == ''
        run: |
          echo "::error::PR number is required for manual trigger"
          exit 1

      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || format('refs/pull/{0}/head', github.event.inputs.pr_number) }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@24c5e13bce349197642746563945fcdf9355e8f4 # v2.0.0
        with:
          version: 3.x

      - name: Run Tests
        run: task test

      - name: Build signet
        run: task build

      - name: Write bridge cert + key
        env:
          BRIDGE_CERT_B64: ${{ needs.identity.outputs.bridge_cert }}
          BRIDGE_KEY_B64: ${{ needs.identity.outputs.bridge_key }}
        run: |
          set -euo pipefail

          if [ -z "$BRIDGE_CERT_B64" ] || [ -z "$BRIDGE_KEY_B64" ]; then
            echo "::error::bridge cert or key is empty — identity exchange may have failed"
            exit 1
          fi

          SIGNET_HOME="${HOME}/.signet"
          mkdir -p "${SIGNET_HOME}/git"

          echo "$BRIDGE_CERT_B64" | base64 -d > "${SIGNET_HOME}/git/bridge-cert.pem"
          echo "$BRIDGE_KEY_B64"  | base64 -d > "${SIGNET_HOME}/git/bridge-key.pem"
          chmod 600 "${SIGNET_HOME}/git/bridge-key.pem"

          # Validate decoded files are non-empty PEM
          if ! grep -q "BEGIN CERTIFICATE" "${SIGNET_HOME}/git/bridge-cert.pem"; then
            echo "::error::decoded cert is not valid PEM"
            exit 1
          fi
          echo "SIGNET_HOME=${SIGNET_HOME}" >> "${GITHUB_ENV}"

      - name: Re-sign PR HEAD commit
        run: |
          set -euo pipefail

          if git log -1 --format='%G?' | grep -qE '[GUXYR]'; then
            echo "Commit is already signed with a valid signature; skipping re-sign."
            exit 0
          fi

          git config gpg.format x509
          git config gpg.x509.program "$(pwd)/signet-git"
          git config commit.gpgsign true

          AUTHOR_NAME="$(git log -1 --format='%an')"
          AUTHOR_EMAIL="$(git log -1 --format='%ae')"
          COMMITTER_NAME="$(git log -1 --format='%cn')"
          COMMITTER_EMAIL="$(git log -1 --format='%ce')"

          git config user.name "${COMMITTER_NAME}"
          git config user.email "${COMMITTER_EMAIL}"

          export GIT_AUTHOR_NAME="${AUTHOR_NAME}"
          export GIT_AUTHOR_EMAIL="${AUTHOR_EMAIL}"
          export GIT_AUTHOR_DATE="$(git log -1 --format='%aI')"
          export GIT_COMMITTER_DATE="$(git log -1 --format='%cI')"

          echo "Re-signing PR commit: $(git log -1 --oneline)"
          git commit --amend --no-edit -S
          echo "Re-signed with CI provenance: $(git log -1 --oneline)"

      - name: Push re-signed commit to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          EXPECTED_SHA="${{ github.event.pull_request.head.sha }}"
          if [ -z "$EXPECTED_SHA" ]; then
            EXPECTED_SHA=$(git rev-parse HEAD^)
          fi

          REF="${{ github.event.pull_request.head.ref }}"
          if [ -z "$REF" ]; then
            PR_NUM="${{ github.event.inputs.pr_number }}"
            if [ -n "$PR_NUM" ]; then
              REF=$(gh pr view "$PR_NUM" --json headRefName -q .headRefName)
            fi
          fi

          if [ -z "$REF" ]; then
            echo "::error::Could not determine PR head ref for push"
            exit 1
          fi

          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          if [ -z "$DEFAULT_BRANCH" ]; then
            DEFAULT_BRANCH=$(gh repo view --json defaultBranchRef -q .defaultBranchRef.name)
          fi

          if [ "$REF" = "$DEFAULT_BRANCH" ]; then
            echo "::error::Ref $REF matches default branch $DEFAULT_BRANCH; aborting push for safety"
            exit 1
          fi

          echo "Pushing re-signed commit to $REF (leasing $EXPECTED_SHA)..."
          git push --force-with-lease="refs/heads/$REF:$EXPECTED_SHA" origin "HEAD:refs/heads/$REF"
          echo "Re-signed commit successfully pushed to $REF"
