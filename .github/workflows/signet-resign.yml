# Re-sign merge commits with Signet
#
# GitHub squash merges create new commits signed by GitHub's web-flow key.
# This workflow re-signs the merge commit with a Signet identity so that
# `git log --show-signature` shows a verifiable signet signature on main.
#
# How it works:
#   1. Start a local Signet authority
#   2. Exchange the GHA OIDC token for a bridge certificate
#   3. Configure signet-git as the gpg.x509.program
#   4. Amend the HEAD commit to add a Signet signature
#   5. Force-push with lease (safe: GITHUB_TOKEN pushes don't retrigger workflows)
#
# Required secrets:
#   SIGNET_MASTER_KEY  PEM-encoded Ed25519 private key (signet format).
#                      Generate with: signet-git init --insecure && cat ~/.signet/master.key
#
# Required variables:
#   SIGNET_RESIGN_ENABLED  Set to 'true' to activate (allows gradual rollout)
#
# Loop prevention:
#   Pushes via GITHUB_TOKEN do not trigger workflow runs (GitHub's built-in behavior).

name: Signet Re-sign

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one re-sign at a time; queue subsequent pushes
concurrency:
  group: signet-resign-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

jobs:
  resign:
    name: Re-sign merge commit
    runs-on: ubuntu-latest

    # Skip if not explicitly enabled
    if: ${{ vars.SIGNET_RESIGN_ENABLED == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build signet
        run: make build

      - name: Setup signet identity
        env:
          SIGNET_MASTER_KEY: ${{ secrets.SIGNET_MASTER_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SIGNET_MASTER_KEY}" ]; then
            echo "::error::SIGNET_MASTER_KEY secret is not configured"
            exit 1
          fi

          SIGNET_HOME="${HOME}/.signet"
          mkdir -p "${SIGNET_HOME}/git"

          # Write persistent master key from secret
          printf '%s\n' "${SIGNET_MASTER_KEY}" > "${SIGNET_HOME}/master.key"
          chmod 600 "${SIGNET_HOME}/master.key"

          echo "SIGNET_HOME=${SIGNET_HOME}" >> "${GITHUB_ENV}"

      - name: Start authority server
        run: |
          set -euo pipefail
          mkdir -p /tmp/signet-resign

          # Authority config — uses the same master key as signet-git.
          # The interactive OIDC fields are required by validation but unused;
          # only the /exchange-token endpoint is exercised.
          cat > /tmp/signet-resign/config.json << EOF
          {
            "oidc_provider_url": "https://token.actions.githubusercontent.com",
            "oidc_client_id": "signet-resign",
            "oidc_client_secret": "unused-for-exchange-flow",
            "redirect_url": "http://localhost:8080/callback",
            "authority_master_key_path": "${SIGNET_HOME}/master.key",
            "listen_addr": ":8080",
            "certificate_validity_hours": 1,
            "oidc_providers_file": "/tmp/signet-resign/oidc-providers.yaml"
          }
          EOF

          cat > /tmp/signet-resign/oidc-providers.yaml << 'EOF'
          providers:
            - type: github-actions
              config:
                name: github-actions
                issuer_url: https://token.actions.githubusercontent.com
                audience: http://localhost:8080
                certificate_validity: 300000000000
                enabled: true
                require_ref_protection: true
          EOF
          # Inject repository restriction (keep heredoc quoted to prevent injection)
          echo "                allowed_repositories:" >> /tmp/signet-resign/oidc-providers.yaml
          echo "                  - ${GITHUB_REPOSITORY}" >> /tmp/signet-resign/oidc-providers.yaml

          export SIGNET_SESSION_SECRET="$(openssl rand -base64 48)"
          ./signet authority --config /tmp/signet-resign/config.json --verbose &

          # Wait for health endpoint
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "Authority server ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Authority server failed to start within 30s"
              exit 1
            fi
            sleep 1
          done

      - name: Exchange OIDC token for bridge certificate
        run: |
          set -euo pipefail

          # Exchange GHA OIDC token for a bridge cert.
          # Place cert and key where signet-git expects them.
          ./signet authority exchange-github-token \
            --authority-url http://localhost:8080 \
            --auto \
            --output "${SIGNET_HOME}/git/bridge-cert.pem" \
            --key-output "${SIGNET_HOME}/git/bridge-key.pem"

          # Verify files landed
          test -f "${SIGNET_HOME}/git/bridge-cert.pem"
          test -f "${SIGNET_HOME}/git/bridge-key.pem"

          echo "Bridge certificate acquired for re-signing"

      - name: Re-sign HEAD commit
        run: |
          set -euo pipefail

          # Configure git to use signet-git for signing
          git config gpg.format x509
          git config gpg.x509.program "$(pwd)/signet-git"
          git config commit.gpgsign true

          # Preserve original author/committer from the merge commit.
          # These come from git history (not untrusted event inputs)
          # and are properly quoted to prevent injection.
          AUTHOR_NAME="$(git log -1 --format='%an')"
          AUTHOR_EMAIL="$(git log -1 --format='%ae')"
          COMMITTER_NAME="$(git log -1 --format='%cn')"
          COMMITTER_EMAIL="$(git log -1 --format='%ce')"

          git config user.name "${COMMITTER_NAME}"
          git config user.email "${COMMITTER_EMAIL}"

          export GIT_AUTHOR_NAME="${AUTHOR_NAME}"
          export GIT_AUTHOR_EMAIL="${AUTHOR_EMAIL}"
          export GIT_AUTHOR_DATE="$(git log -1 --format='%aI')"
          export GIT_COMMITTER_DATE="$(git log -1 --format='%cI')"

          echo "Re-signing commit: $(git log -1 --oneline)"

          # Amend to add signet signature (preserves message, tree, parent)
          git commit --amend --no-edit -S

          echo "Re-signed: $(git log -1 --oneline)"

      - name: Push re-signed commit
        run: |
          set -euo pipefail

          # Force-push with lease to prevent overwriting concurrent merges.
          # GITHUB_TOKEN pushes do not trigger workflow runs, preventing loops.
          git push --force-with-lease origin main

          echo "Re-signed commit pushed to main"
