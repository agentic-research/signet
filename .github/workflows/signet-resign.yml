# Signet Re-sign - Safe Chained Provenance
#
# This workflow implements the "Semantic Firewall" pattern:
#   1. Developer signs a commit with their user identity.
#   2. PR is reviewed and approved by a human peer.
#   3. On approval, the CI system (Signet Authority) verifies the user's signature
#      and passes all tests, then re-signs (amends) the commit with its own "Seal of Approval".
#   4. The PR now has a "Chained Provenance" (User + CI) and can be merged to main.
#
# This avoids force-pushing to main while ensuring everything in main has CI's seal.

name: Signet Re-sign

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to re-sign (required for manual trigger)'
        required: false
        type: string

# Only one re-sign at a time for the same PR
concurrency:
  group: signet-resign-${{ github.event.pull_request.number || github.event.inputs.pr_number || 'manual' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

jobs:
  resign:
    name: Re-sign approved PR
    runs-on: ubuntu-latest

    # Only run if:
    # 1. Approval is submitted (or manual trigger)
    # 2. Re-signing is enabled via variable
    # 3. PR is NOT from a fork (GITHUB_TOKEN cannot push to forks)
    if: |
      (github.event.review.state == 'approved' || github.event_name == 'workflow_dispatch') &&
      vars.SIGNET_RESIGN_ENABLED == 'true' &&
      (github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch')

    steps:
      - name: Validate Manual Trigger
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number == ''
        run: |
          echo "::error::PR number is required for manual trigger"
          exit 1

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          # Use the head ref of the PR so we can push back to it
          ref: ${{ github.event.pull_request.head.ref || format('refs/pull/{0}/head', github.event.inputs.pr_number) }}
          fetch-depth: 0 # Full history needed for amend

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Run Tests
        run: task test

      - name: Build signet
        run: task build

      - name: Setup signet identity
        env:
          SIGNET_MASTER_KEY: ${{ secrets.SIGNET_MASTER_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SIGNET_MASTER_KEY}" ]; then
            echo "::error::SIGNET_MASTER_KEY secret is not configured"
            exit 1
          fi

          SIGNET_HOME="${HOME}/.signet"
          mkdir -p "${SIGNET_HOME}/git"

          # Write persistent master key from secret
          printf '%s\n' "${SIGNET_MASTER_KEY}" > "${SIGNET_HOME}/master.key"
          chmod 600 "${SIGNET_HOME}/master.key"

          echo "SIGNET_HOME=${SIGNET_HOME}" >> "${GITHUB_ENV}"

      - name: Start authority server
        run: |
          set -euo pipefail
          mkdir -p /tmp/signet-resign

          # Authority config
          cat > /tmp/signet-resign/config.json << EOF
          {
            "oidc_provider_url": "https://token.actions.githubusercontent.com",
            "oidc_client_id": "signet-resign",
            "oidc_client_secret": "unused-for-exchange-flow",
            "redirect_url": "http://localhost:8080/callback",
            "authority_master_key_path": "${SIGNET_HOME}/master.key",
            "listen_addr": ":8080",
            "certificate_validity_hours": 1,
            "oidc_providers_file": "/tmp/signet-resign/oidc-providers.yaml"
          }
          EOF

          cat > /tmp/signet-resign/oidc-providers.yaml << 'EOF'
          providers:
            - type: github-actions
              config:
                name: github-actions
                issuer_url: https://token.actions.githubusercontent.com
                audience: http://localhost:8080
                certificate_validity: 300000000000
                enabled: true
                require_ref_protection: true
          EOF
          # Inject repository restriction
          echo "      allowed_repositories:" >> /tmp/signet-resign/oidc-providers.yaml
          echo "        - ${GITHUB_REPOSITORY}" >> /tmp/signet-resign/oidc-providers.yaml

          export SIGNET_SESSION_SECRET="$(openssl rand -base64 48)"
          ./signet authority --config /tmp/signet-resign/config.json --verbose &

          # Wait for health endpoint
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "Authority server ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Authority server failed to start within 30s"
              exit 1
            fi
            sleep 1
          done

      - name: Exchange OIDC token for bridge certificate
        run: |
          set -euo pipefail

          # Exchange GHA OIDC token for a bridge cert.
          ./signet authority exchange-github-token \
            --authority-url http://localhost:8080 \
            --auto \
            --output "${SIGNET_HOME}/git/bridge-cert.pem" \
            --key-output "${SIGNET_HOME}/git/bridge-key.pem"

          test -f "${SIGNET_HOME}/git/bridge-cert.pem"
          test -f "${SIGNET_HOME}/git/bridge-key.pem"

      - name: Re-sign PR HEAD commit
        run: |
          set -euo pipefail

          # Check if the commit is already signed by a valid/trusted identity.
          # Any of G/U/X/Y/R indicates a present valid signature that we should not duplicate.
          if git log -1 --format='%G?' | grep -qE '[GUXYR]'; then
            echo "Commit is already signed with a valid signature; skipping re-sign."
            exit 0
          fi

          # Configure git to use signet-git for signing
          git config gpg.format x509
          git config gpg.x509.program "$(pwd)/signet-git"
          git config commit.gpgsign true

          # Preserve original author/committer
          AUTHOR_NAME="$(git log -1 --format='%an')"
          AUTHOR_EMAIL="$(git log -1 --format='%ae')"
          COMMITTER_NAME="$(git log -1 --format='%cn')"
          COMMITTER_EMAIL="$(git log -1 --format='%ce')"

          git config user.name "${COMMITTER_NAME}"
          git config user.email "${COMMITTER_EMAIL}"

          export GIT_AUTHOR_NAME="${AUTHOR_NAME}"
          export GIT_AUTHOR_EMAIL="${AUTHOR_EMAIL}"
          export GIT_AUTHOR_DATE="$(git log -1 --format='%aI')"
          export GIT_COMMITTER_DATE="$(git log -1 --format='%cI')"

          echo "Re-signing PR commit: $(git log -1 --oneline)"

          # Amend to add signet signature
          git commit --amend --no-edit -S

          echo "Re-signed with CI provenance: $(git log -1 --oneline)"

      - name: Push re-signed commit to PR
        run: |
          set -euo pipefail
          
          # Guard against empty ref (workflow_dispatch safety)
          REF="${{ github.event.pull_request.head.ref }}"
          if [ -z "$REF" ]; then
            # Attempt to resolve ref from PR number if manual
            PR_NUM="${{ github.event.inputs.pr_number }}"
            if [ -n "$PR_NUM" ]; then
               REF=$(gh pr view "$PR_NUM" --json headRefName -q .headRefName)
            fi
          fi

          if [ -z "$REF" ]; then
            echo "::error::Could not determine PR head ref for push"
            exit 1
          fi

          # Force-push back to the PR head branch.
          # This is safe because it's a feature branch and approval was granted.
          git push --force-with-lease origin "HEAD:refs/heads/$REF"

          echo "Re-signed commit pushed to $REF"
        env:
          GH_TOKEN: ${{ github.token }}
