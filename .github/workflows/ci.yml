name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Test Suite (Pure Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better git operations

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: |
          go mod download
          go mod verify

      - name: Run unit tests
        run: task test

      - name: Run linters
        run: task lint

      - name: Build binaries
        run: |
          task build
          ./signet --help || echo "signet binary built successfully"
          ./signet-git --help || echo "signet-git binary built successfully"

      - name: Run Docker integration tests
        run: task integration-test

      - name: Build HTTP demo binaries
        run: |
          cd demo/http-auth/server && go build -o server .
          cd ../client && go build -o client .

      - name: Run HTTP integration tests (SIG1 wire format)
        run: |
          ./scripts/testing/test_sig1_http_integration.sh

  test-pkcs11:
    name: Test Suite (PKCS#11 with CGO)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better git operations

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install SoftHSM and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y softhsm2 build-essential

      - name: Install dependencies
        run: |
          go mod download
          go mod verify

      - name: Run unit tests with pkcs11 tag
        run: task test TAGS=pkcs11

      - name: Build binaries with pkcs11 tag
        run: |
          task build TAGS=pkcs11
          ./signet --help || echo "signet binary built successfully with PKCS#11 support"
          ./signet-git --help || echo "signet-git binary built successfully with PKCS#11 support"

      # Optional: Upload coverage to codecov
      # - name: Upload coverage
      #   uses: codecov/codecov-action@v3
      #   with:
      #     file: ./coverage.out
      #     flags: unittests

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -benchtime=10s ./pkg/attest/x509 | tee bench.txt

          # Show benchmark results in PR
          echo "### Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat bench.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy security scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      # TODO: Re-enable Gitleaks after repo goes public
      # Gitleaks requires access to PR commits which doesn't work
      # properly with private repos and GitHub Actions permissions
      # - name: Check for secrets with gitleaks
      #   uses: gitleaks/gitleaks-action@v2
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
