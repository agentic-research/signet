name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  test:
    name: Test Suite (Pure Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # Full history for better git operations

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install Task
        uses: arduino/setup-task@24c5e13bce349197642746563945fcdf9355e8f4 # v2.0.0
        with:
          version: 3.x

      - name: Install golangci-lint
        # SHA-pinned per repo convention (PR #116, PR #113). Two pins:
        #
        # 1. install.sh URL → commit 35b2189 ("fix: install.sh script #6539",
        #    2026-05-01). Most recent install.sh-touching commit on `main`
        #    (golangci-lint renamed default branch from master to main; the
        #    previous URL still using `master` was already drifting). Bump
        #    when upstream ships further install.sh fixes.
        #
        # 2. golangci-lint version → v2.12.1 (released 2026-05-02). The
        #    next release v2.12.2 (2026-05-06) ships a tarball whose
        #    published checksum doesn't match the actual download
        #    (observed in this repo's CI 2026-05-09: expected 8df580…,
        #    got fd3a13…), failing install.sh's verify step. Stay on
        #    v2.12.1 until upstream re-publishes a working v2.12.2 (or
        #    cuts a v2.12.3); when bumping, update BOTH this pin AND
        #    the URL pin above to a commit that includes the new release.
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/35b2189782a6a059489289257e6523550167cb64/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.12.1
          golangci-lint --version

      - name: Install dependencies
        run: |
          go mod download
          go mod verify

      - name: Run unit tests
        run: task test

      - name: Run linters
        run: task lint

      - name: Build binaries
        run: |
          task build
          ./signet --help || echo "signet binary built successfully"
          ./signet-git --help || echo "signet-git binary built successfully"

      - name: Run Docker integration tests
        run: task integration-test

      - name: Build HTTP demo binaries
        run: |
          cd demo/http-auth/server && go build -o server .
          cd ../client && go build -o client .

      - name: Run HTTP integration tests (SIG1 wire format)
        run: |
          ./scripts/testing/test_sig1_http_integration.sh

  test-pkcs11:
    name: Test Suite (PKCS#11 with CGO)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # Full history for better git operations

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install Task
        uses: arduino/setup-task@24c5e13bce349197642746563945fcdf9355e8f4 # v2.0.0
        with:
          version: 3.x

      - name: Install SoftHSM and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y softhsm2 build-essential

      - name: Install dependencies
        run: |
          go mod download
          go mod verify

      - name: Run unit tests with pkcs11 tag
        run: task test TAGS=pkcs11

      - name: Build binaries with pkcs11 tag
        run: |
          task build TAGS=pkcs11
          ./signet --help || echo "signet binary built successfully with PKCS#11 support"
          ./signet-git --help || echo "signet-git binary built successfully with PKCS#11 support"

      # Optional: Upload coverage to codecov
      # - name: Upload coverage
      #   uses: codecov/codecov-action@v3
      #   with:
      #     file: ./coverage.out
      #     flags: unittests

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -benchtime=10s ./pkg/attest/x509 | tee bench.txt

          # Show benchmark results in PR
          echo "### Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat bench.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4
          gosec -severity high -confidence high ./...

