name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Test Suite (Pure Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better git operations

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install dependencies
        run: |
          go mod download
          go mod verify

      - name: Run unit tests
        run: |
          set -euo pipefail

          # Get list of packages excluding demo directories
          PKGS="$(go list ./... | grep -v '/demo/' || true)"

          if [ -z "${PKGS}" ]; then
            echo "No packages to test."
            exit 0
          fi

          # Create empty coverage file with header
          echo "mode: atomic" > coverage.out

          # Test each package individually and merge coverage
          echo "${PKGS}" | while read -r pkg; do
            if [ -n "$pkg" ]; then
              echo "Testing ${pkg}..."
              # Check if package has test files
              if go list -f '{{.TestGoFiles}}' "$pkg" | grep -q '\[.*\.go\]'; then
                go test -v -race -coverprofile=tmp.out -covermode=atomic "$pkg"
                # Merge coverage data (skip mode line)
                if [ -f tmp.out ]; then
                  grep -h -v "^mode:" tmp.out >> coverage.out 2>/dev/null || true
                  rm tmp.out
                fi
              else
                echo "  No test files found, skipping..."
              fi
            fi
          done

          # Display coverage report
          go tool cover -func=coverage.out

      - name: Run linters
        run: |
          go fmt ./...
          go vet ./...
          test -z "$(gofmt -l .)" || (echo "Please run go fmt" && exit 1)

      - name: Build binaries
        run: |
          make build
          ./signet --help || echo "signet binary built successfully"
          ./signet-git --help || echo "signet-git binary built successfully"

      - name: Run Docker integration tests
        run: |
          make integration-test

  test-pkcs11:
    name: Test Suite (PKCS#11 with CGO)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better git operations

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install SoftHSM and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y softhsm2 build-essential

      - name: Install dependencies
        run: |
          go mod download
          go mod verify

      - name: Run unit tests with pkcs11 tag
        run: |
          set -euo pipefail

          # Get list of packages excluding demo directories
          PKGS="$(go list ./... | grep -v '/demo/' || true)"

          if [ -z "${PKGS}" ]; then
            echo "No packages to test."
            exit 0
          fi

          # Create empty coverage file with header
          echo "mode: atomic" > coverage-pkcs11.out

          # Test each package individually with pkcs11 tag and merge coverage
          echo "${PKGS}" | while read -r pkg; do
            if [ -n "$pkg" ]; then
              echo "Testing ${pkg} with pkcs11 tag..."
              # Check if package has test files
              if go list -f '{{.TestGoFiles}}' "$pkg" | grep -q '\[.*\.go\]'; then
                go test -v -race -tags=pkcs11 -coverprofile=tmp.out -covermode=atomic "$pkg"
                # Merge coverage data (skip mode line)
                if [ -f tmp.out ]; then
                  grep -h -v "^mode:" tmp.out >> coverage-pkcs11.out 2>/dev/null || true
                  rm tmp.out
                fi
              else
                echo "  No test files found, skipping..."
              fi
            fi
          done

          # Display coverage report
          go tool cover -func=coverage-pkcs11.out

      - name: Build binaries with pkcs11 tag
        run: |
          make build TAGS=pkcs11
          ./signet --help || echo "signet binary built successfully with PKCS#11 support"
          ./signet-git --help || echo "signet-git binary built successfully with PKCS#11 support"

      # Optional: Upload coverage to codecov
      # - name: Upload coverage
      #   uses: codecov/codecov-action@v3
      #   with:
      #     file: ./coverage.out
      #     flags: unittests

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -benchtime=10s ./pkg/attest/x509 | tee bench.txt

          # Show benchmark results in PR
          echo "### Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat bench.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy security scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      # TODO: Re-enable Gitleaks after repo goes public
      # Gitleaks requires access to PR commits which doesn't work
      # properly with private repos and GitHub Actions permissions
      # - name: Check for secrets with gitleaks
      #   uses: gitleaks/gitleaks-action@v2
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
