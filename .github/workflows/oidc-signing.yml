name: OIDC Signing E2E

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  oidc-signing-test:
    name: OIDC Token Exchange E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build signet
        run: make build

      - name: Setup test environment
        run: |
          set -euo pipefail
          mkdir -p /tmp/signet-test

          # Generate ephemeral master key for the test authority
          openssl genpkey -algorithm ed25519 -out /tmp/signet-test/master.pem

          # Authority config — the interactive OIDC fields are required by
          # validation but unused; only the exchange-token endpoint is exercised.
          cat > /tmp/signet-test/config.json << 'EOF'
          {
            "oidc_provider_url": "https://token.actions.githubusercontent.com",
            "oidc_client_id": "signet-e2e-test",
            "oidc_client_secret": "unused-for-exchange-flow",
            "redirect_url": "http://localhost:8080/callback",
            "authority_master_key_path": "/tmp/signet-test/master.pem",
            "listen_addr": ":8080",
            "certificate_validity_hours": 1,
            "oidc_providers_file": "/tmp/signet-test/oidc-providers.yaml"
          }
          EOF

          # OIDC provider config — audience must match --authority-url
          cat > /tmp/signet-test/oidc-providers.yaml << 'EOF'
          providers:
            - type: github-actions
              config:
                name: github-actions
                issuer_url: https://token.actions.githubusercontent.com
                audience: http://localhost:8080
                certificate_validity: 300000000000  # 5 minutes in nanoseconds (time.Duration)
                enabled: true
          EOF

      - name: Start authority server (background)
        run: |
          set -euo pipefail
          export SIGNET_SESSION_SECRET="$(openssl rand -base64 48)"
          ./signet authority --config /tmp/signet-test/config.json --verbose &

          # Wait for health endpoint
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "Authority server ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Authority server failed to start within 30s"
              exit 1
            fi
            sleep 1
          done

      - name: Exchange OIDC token for bridge certificate
        run: |
          ./signet authority exchange-github-token \
            --authority-url http://localhost:8080 \
            --auto \
            --output /tmp/signet-test/bridge-cert.pem

      - name: Verify bridge certificate
        run: |
          set -euo pipefail

          # Certificate and ephemeral key must exist
          test -f /tmp/signet-test/bridge-cert.pem
          test -f /tmp/signet-test/ephemeral-key.pem

          # Parse and display certificate
          CERT_TEXT=$(openssl x509 -in /tmp/signet-test/bridge-cert.pem -text -noout)
          echo "$CERT_TEXT"

          # Verify short-lived (bridge cert validity <= 24 hours)
          NOT_BEFORE=$(openssl x509 -in /tmp/signet-test/bridge-cert.pem -startdate -noout | cut -d= -f2)
          NOT_AFTER=$(openssl x509 -in /tmp/signet-test/bridge-cert.pem -enddate -noout | cut -d= -f2)
          echo "Certificate valid from: $NOT_BEFORE"
          echo "Certificate valid until: $NOT_AFTER"
          NB_TS=$(date -u -d "$NOT_BEFORE" +%s)
          NA_TS=$(date -u -d "$NOT_AFTER" +%s)
          LIFETIME_SECONDS=$((NA_TS - NB_TS))
          MAX_LIFETIME_SECONDS=$((24 * 60 * 60))
          if [ "$LIFETIME_SECONDS" -gt "$MAX_LIFETIME_SECONDS" ]; then
            echo "ERROR: Bridge cert lifetime too long: ${LIFETIME_SECONDS}s (max: ${MAX_LIFETIME_SECONDS}s)"
            exit 1
          fi
          echo "Certificate lifetime: ${LIFETIME_SECONDS}s (within ${MAX_LIFETIME_SECONDS}s limit)"

          # Assert bridge cert is intermediate CA (IsCA:true, MaxPathLen:0)
          if ! echo "$CERT_TEXT" | grep -q "CA:TRUE"; then
            echo "ERROR: Bridge certificate is not marked as CA"
            exit 1
          fi
          if ! echo "$CERT_TEXT" | grep -Eqi "pathlen:0|Path Length Constraint: 0"; then
            echo "ERROR: Bridge certificate does not have path length constraint 0"
            exit 1
          fi

          # Assert Key Usage includes certificate signing
          if ! echo "$CERT_TEXT" | grep -qi "Certificate Sign"; then
            echo "ERROR: Bridge certificate Key Usage does not include Certificate Sign"
            exit 1
          fi

          # Assert Signet capability OID present (1.3.6.1.4.1.99999.1.3)
          if ! echo "$CERT_TEXT" | grep -q "1.3.6.1.4.1.99999.1.3"; then
            echo "ERROR: Missing Signet capability extension OID 1.3.6.1.4.1.99999.1.3"
            exit 1
          fi

          echo "Bridge certificate verification passed"

      - name: Sign test artifact with bridge cert
        run: |
          set -euo pipefail
          echo "signet e2e test payload" > /tmp/signet-test/artifact.txt

          # Sign with the ephemeral key bound to the bridge cert
          # Ed25519 requires -rawin (no digest, signs raw data)
          openssl pkeyutl -sign -rawin \
            -inkey /tmp/signet-test/ephemeral-key.pem \
            -in /tmp/signet-test/artifact.txt \
            -out /tmp/signet-test/artifact.txt.sig

          # Extract public key from bridge cert and verify
          openssl x509 -in /tmp/signet-test/bridge-cert.pem -pubkey -noout \
            > /tmp/signet-test/bridge-pub.pem

          openssl pkeyutl -verify -rawin \
            -pubin -inkey /tmp/signet-test/bridge-pub.pem \
            -in /tmp/signet-test/artifact.txt \
            -sigfile /tmp/signet-test/artifact.txt.sig

          echo "Artifact signed and verified with bridge certificate keypair"
