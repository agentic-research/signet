# Signet OIDC Providers Configuration
# This file defines which identity providers can issue bridge certificates.
#
# Usage:
#   signet authority --config authority.json --oidc-providers oidc-providers.yaml

providers:
  # GitHub Actions OIDC provider
  # Enables secret-free signing in GitHub Actions workflows
  - type: github-actions
    config:
      name: github-actions
      issuer_url: https://token.actions.githubusercontent.com

      # Audience should match your authority's public URL
      audience: https://signet-authority.example.com

      # Bridge certificate validity (default: 5 minutes per 004-bridge-certs.md)
      certificate_validity: 5m

      enabled: true

      # Optional: Restrict to specific repositories
      # Useful for self-hosted authorities serving specific organizations
      # allowed_repositories:
      #   - jamestexas/signet
      #   - acme/production-app
      #   - acme/internal-tool

      # Optional: Restrict to specific workflows
      # Useful for enforcing release workflow patterns
      # allowed_workflows:
      #   - .github/workflows/release.yml
      #   - .github/workflows/deploy.yml
      #   - .github/workflows/sign-artifacts.yml

      # Optional: Require protected refs (prevents PRs from forks)
      # Recommended for production authorities
      # require_ref_protection: false

